name: daily-digest
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - run: pip install -r requirements.txt
      - run: python -m scripts.daily_job
        env:
          NCBI_EMAIL: ${{ secrets.NCBI_EMAIL }}
          ENABLE_TR_SUMMARY: "false"
          MODE: balanced
          RECENCY_YEARS: "5"
      - run: |
          git config user.name "digest-bot"
          git config user.email "bot@plastik-digest"
          git add data/
          git diff --cached --quiet || git commit -m "digest: $(date -u +%Y-%m-%d)"
          git push
